# ai-agent 설정 파일

local_llm:
  enabled: true
  provider: ollama
  base_url: "http://192.168.0.229:11345"
  model: "qwen3.5:9b-mlx"
  temperature: 0.7

openrouter:
  enabled: false   # true면 local_llm 위임/폴백 시 external_tools보다 먼저 사용
  base_url: "https://openrouter.ai/api/v1"
  api_key: ""      # 비워두면 OPENROUTER_API_KEY 환경변수 사용
  # auto_model이 false(기본)이거나 models가 비어있을 때 쓰는 고정 모델.
  model: "anthropic/claude-5-sonnet"
  temperature: 0.2
  # true(기본)면 agentic_loop의 대용량 system 프롬프트에 Anthropic 프롬프트
  # 캐싱(cache_control)을 적용한다. anthropic/* 모델에서만 동작하며, 매 스텝
  # 반복 전송되는 system을 캐시해 스텝 수에 비례해 늘던 비용을 크게 줄인다.
  cache_system: true

  # true면 작업 설명을 보고(규칙 기반 휴리스틱, 추가 API 호출 없음) 복잡도
  # 점수를 매겨 아래 models 목록에서 알맞은 모델을 자동으로 골라 연결한다.
  # false(기본)면 위 model 고정값만 쓴다.
  auto_model: false
  # 반드시 "싼/약한 모델 → 비싼/강한 모델" 순서로 적을 것. 작업 복잡도 점수가
  # max_score 이하인 첫 항목을 고르고, 모든 항목을 초과하면 마지막(가장 강한)
  # 모델로 폴백한다. router.score_task_complexity() 참고 — 점수는 작업 설명
  # 길이, 어려움/쉬움 키워드, 언급된 파일 개수 등으로 대략 0~15 범위로 계산된다.
  models:
    - name: "anthropic/claude-haiku-4.5"
      max_score: 3       # 오타 수정, 설명/요약, 이름 변경 등 단순 작업
    - name: "anthropic/claude-5-sonnet"
      max_score: 8       # 일반적인 기능 추가/버그 수정
    - name: "anthropic/claude-opus-4.8"
      max_score: 999     # 리팩토링/아키텍처 변경/여러 파일에 걸친 복잡한 작업

external_tools:
  default: claude_code   # local 판단 실패 시 기본 사용 도구: claude_code | codex
  claude_code:
    enabled: true
    command: ["claude", "-p"]          # 자동 라우팅(비대화형 1회성) 위임용
    interactive_command: ["claude"]    # /model claude 대화형 핸드오프용 (TTY 전환)
    model: "claude-sonnet-4-6"       # 미설정 시 claude CLI 기본값 사용
  codex:
    enabled: true
    command: ["codex", "exec"]         # 자동 라우팅(비대화형 1회성) 위임용
    interactive_command: ["codex"]     # /model codex 대화형 핸드오프용 (TTY 전환)
    model: "o4-mini"                 # 미설정 시 codex CLI 기본값 사용

harness:
  # 수정 대상 프로젝트 폴더. 프레임워크 파일(agent.py 등)과 분리하기 위해
  # 이 하위 폴더 안의 파일만 탐색/수정한다. 프레임워크 루트 전체를 대상으로 하려면 "."
  work_dir: "workspace"
  # 권한 모드 기본값: manual(전부 승인) | edit-only(파일수정 자동, 명령만 승인) | auto(전부 자동)
  # /mode 명령으로 대화형 세션 중 전환 가능.
  default_mode: "edit-only"
  # 에이전틱 루프(복잡한/다단계 작업)가 done을 선언하지 않고 반복할 수 있는 최대 스텝 수.
  # 스텝마다 도구 호출 1번(read_file/grep/write_file/run_command 등) + LLM 호출 1번.
  agentic_max_steps: 20
  # 작업 1건이 소모할 수 있는 누적 비용 상한(달러, OpenRouter 백엔드 기준 추정치).
  # 이 값을 넘으면 done/max_steps를 기다리지 않고 즉시 중단한다. 비워두거나
  # 0/null이면 비활성화(비용 기준 중단 없음 — 기본값).
  max_cost_usd: null
  # max_cost_usd 계산에 쓸 단가(USD/1M 토큰). 비워두면 harness/metrics.py의
  # DEFAULT_PRICE_PER_MTOK(실제 사용 모델 단가로 맞춰둔 값)를 그대로 쓴다.
  price_per_mtok: null
  verify_timeout_sec: 120
  # true면 run_command로 실행되는 셸 명령에 전체 환경변수 대신 최소 화이트리스트
  # (PATH/HOME/LANG 등, harness/verifier.py의 _SANDBOX_ENV_ALLOWLIST 참고)만
  # 전달한다. AWS_*/*_TOKEN/*_KEY 등 자격증명이 에이전트가 실행하는 명령에
  # 상속되는 경로를 차단하는 가벼운 격리(컨테이너 격리는 아님). 기본 false —
  # 대상 프로젝트 빌드가 특정 환경변수에 의존하면 켜기 전 화이트리스트 확인 필요.
  sandbox_env: false
  # true면 에이전틱 루프의 매 스텝(도구 호출·결과)을 마스킹 후 logs/trace.jsonl에
  # 기록한다. 감사(audit)/디버깅용 전체 트레이스. 기본 false(로그 크기 절약).
  trace_log: false
  backup_dir: ".agent_backup"
  exclude_dirs:
    - node_modules
    - .git
    - .agent_backup
    - __pycache__
    - venv
    - .venv
    # .NET 프로젝트를 다룰 때 필요. 없으면 "License" 같은 흔한 단어 검색 시
    # NuGet 패키지 고지문/빌드 산출물이 실제 소스코드보다 우선 매칭될 수 있다.
    - packages
    - bin
    - obj
    - .vs

logging:
  log_dir: "logs"
  level: "INFO"

sessions:
  dir: "sessions"   # CLI 대화 세션 저장 폴더 (YYYYMMDD_HHMMSS[_태그].md)
