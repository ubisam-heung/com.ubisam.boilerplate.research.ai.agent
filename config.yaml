# ai-agent 설정 파일

local_llm:
  enabled: true
  provider: ollama
  base_url: "http://192.168.0.229:11345"
  model: "qwen3.5:9b-mlx"
  temperature: 0.7

openrouter:
  enabled: false   # true면 local_llm 위임/폴백 시 external_tools보다 먼저 사용
  base_url: "https://openrouter.ai/api/v1"
  api_key: ""      # 비워두면 OPENROUTER_API_KEY 환경변수 사용
  model: "anthropic/claude-5-sonnet"
  temperature: 0.2

external_tools:
  default: claude_code   # local 판단 실패 시 기본 사용 도구: claude_code | codex
  claude_code:
    enabled: true
    command: ["claude", "-p"]          # 자동 라우팅(비대화형 1회성) 위임용
    interactive_command: ["claude"]    # /model claude 대화형 핸드오프용 (TTY 전환)
    model: "claude-sonnet-4-6"       # 미설정 시 claude CLI 기본값 사용
  codex:
    enabled: true
    command: ["codex", "exec"]         # 자동 라우팅(비대화형 1회성) 위임용
    interactive_command: ["codex"]     # /model codex 대화형 핸드오프용 (TTY 전환)
    model: "o4-mini"                 # 미설정 시 codex CLI 기본값 사용

harness:
  # 수정 대상 프로젝트 폴더. 프레임워크 파일(agent.py 등)과 분리하기 위해
  # 이 하위 폴더 안의 파일만 탐색/수정한다. 프레임워크 루트 전체를 대상으로 하려면 "."
  work_dir: "workspace"
  # 권한 모드 기본값: manual(전부 승인) | edit-only(파일수정 자동, 명령만 승인) | auto(전부 자동)
  # /mode 명령으로 대화형 세션 중 전환 가능.
  default_mode: "edit-only"
  # 에이전틱 루프(복잡한/다단계 작업)가 done을 선언하지 않고 반복할 수 있는 최대 스텝 수.
  # 스텝마다 도구 호출 1번(read_file/grep/write_file/run_command 등) + LLM 호출 1번.
  agentic_max_steps: 20
  verify_timeout_sec: 120
  backup_dir: ".agent_backup"
  exclude_dirs:
    - node_modules
    - .git
    - .agent_backup
    - __pycache__
    - venv
    - .venv
    # .NET 프로젝트를 다룰 때 필요. 없으면 "License" 같은 흔한 단어 검색 시
    # NuGet 패키지 고지문/빌드 산출물이 실제 소스코드보다 우선 매칭될 수 있다.
    - packages
    - bin
    - obj
    - .vs

logging:
  log_dir: "logs"
  level: "INFO"

sessions:
  dir: "sessions"   # CLI 대화 세션 저장 폴더 (YYYYMMDD_HHMMSS[_태그].md)
